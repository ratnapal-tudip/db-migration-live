log_format upstream_logging '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'to: $upstream_addr status: $upstream_status rt: $upstream_response_time';

upstream app_servers {
    # server app-blue:8000;
    server app-green:8000;
}

server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log upstream_logging;

    location / {
        proxy_pass http://app_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching to ensure client immediately gets the correct version
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
